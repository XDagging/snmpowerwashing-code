<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>S&amp;M Powerwashing | Professional Power Washing Services</title>
    <meta name="description" content="S&amp;M Powerwashing offers professional residential and commercial power washing. Expert pressure washing, oil stain removal, mold treatment, and surface restoration. Starting from $150. Get a free quote today." />
    <meta name="keywords" content="power washing, pressure washing, driveway cleaning, residential power washing, commercial power washing, oil stain removal, house washing, patio cleaning" />
    <link rel="canonical" href="https://www.smpowerwashing.com/" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.smpowerwashing.com/" />
    <meta property="og:title" content="S&amp;M Powerwashing | Professional Power Washing Services" />
    <meta property="og:description" content="Expert residential and commercial power washing. Starting from $150. Satisfaction guaranteed. Get your free quote today." />
    <meta property="og:image" content="https://www.smpowerwashing.com/og-image.jpg" />
    <meta property="og:site_name" content="S&amp;M Powerwashing" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="S&amp;M Powerwashing | Professional Power Washing Services" />
    <meta name="twitter:description" content="Expert residential and commercial power washing. Starting from $150. Get your free quote today." />
    <meta name="twitter:image" content="https://www.smpowerwashing.com/og-image.jpg" />

    <!-- Structured Data: LocalBusiness (SEO + AEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "@id": "https://www.smpowerwashing.com/#business",
      "name": "S&M Powerwashing",
      "description": "Professional residential and commercial power washing services. Expert pressure washing, oil stain removal, mold treatment, and surface restoration. Satisfaction guaranteed.",
      "url": "https://www.smpowerwashing.com",
      "telephone": "+15551234567",
      "email": "quotes@smpowerwashing.com",
      "priceRange": "$$",
      "currenciesAccepted": "USD",
      "paymentAccepted": "Cash, Credit Card, Check",
      "areaServed": {
        "@type": "AdministrativeArea",
        "name": "Greater Metropolitan Area"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Driveway Cleaning Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Residential Power Washing",
              "description": "Professional power washing for home driveways, patios, and surfaces — removing oil stains, mold, and grime."
            },
            "priceSpecification": {
              "@type": "PriceSpecification",
              "priceCurrency": "USD",
              "price": "150",
              "minPrice": "150"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Commercial Power Washing",
              "description": "Large-scale power washing for business parking lots, loading bays, and commercial entrances."
            },
            "priceSpecification": {
              "@type": "PriceSpecification",
              "priceCurrency": "USD",
              "price": "299",
              "minPrice": "299"
            }
          }
        ]
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "reviewCount": "87",
        "bestRating": "5",
        "worstRating": "1"
      },
      "review": [
        {
          "@type": "Review",
          "author": { "@type": "Person", "name": "Sarah M." },
          "reviewRating": { "@type": "Rating", "ratingValue": "5" },
          "reviewBody": "My driveway looks brand new — they removed oil stains I thought were permanent. Absolutely worth every penny!"
        },
        {
          "@type": "Review",
          "author": { "@type": "Person", "name": "David T." },
          "reviewRating": { "@type": "Rating", "ratingValue": "5" },
          "reviewBody": "The team was punctual, friendly, and worked incredibly efficiently. Neighbours have been asking who we used."
        },
        {
          "@type": "Review",
          "author": { "@type": "Person", "name": "Linda K." },
          "reviewRating": { "@type": "Rating", "ratingValue": "5" },
          "reviewBody": "Our realtor said it was the best curb appeal on the street after they cleaned the driveway."
        }
      ]
    }
    </script>

    <!-- Structured Data: FAQ (AEO — answer engine / AI search optimization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much does driveway cleaning cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "S&M Powerwashing offers residential driveway cleaning starting from $150 and commercial driveway cleaning starting from $299. Exact pricing depends on the size and condition of the surface. Contact us for a free, no-obligation quote."
          }
        },
        {
          "@type": "Question",
          "name": "What is included in a driveway cleaning service?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our driveway cleaning service includes high-pressure washing to remove dirt, mold, algae, and oil stains from concrete, asphalt, block paving, and tarmac driveways. We use eco-friendly, biodegradable cleaning solutions that are safe for your family, pets, and surrounding garden."
          }
        },
        {
          "@type": "Question",
          "name": "How long does driveway cleaning take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A standard residential driveway cleaning typically takes 1–3 hours depending on the size and level of soiling. Commercial jobs are quoted individually. We work efficiently to minimise disruption to your day."
          }
        },
        {
          "@type": "Question",
          "name": "Is Grime & Gloss Cleaning licensed and insured?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. S&M Powerwashing is fully licensed and carries $2M liability insurance, giving you complete peace of mind on every job."
          }
        },
        {
          "@type": "Question",
          "name": "Do you offer a satisfaction guarantee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. If you're not completely satisfied with the result, we will return and re-clean your driveway at no extra charge — no questions asked."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get a free driveway cleaning quote?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Fill out the free quote form on our website with your name, contact details, address, and service type. We'll get back to you within 24 hours with a personalised, no-obligation quote."
          }
        }
      ]
    }
    </script>
